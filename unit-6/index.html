<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocabulary Practice - Word Scramble</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Lexend', sans-serif;
            background: linear-gradient(135deg, #fdfcfb 0%, #e2d1c3 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }
        .image-container {
            width: 100%;
            max-width: 500px;
            aspect-ratio: 16 / 9;
            background-color: #f3f4f6;
            border-radius: 1rem;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .fallback-emoji {
            font-size: 5rem;
        }
        .letter-tile {
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            user-select: none;
        }
        .letter-tile:active {
            transform: scale(0.9);
        }
        .slot {
            width: 3rem;
            height: 3.5rem;
            border-bottom: 3px solid #cbd5e1;
            margin: 0.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 800;
            color: #1e293b;
        }
        .slot.filled {
            border-bottom-color: #3b82f6;
        }
        .space-slot {
            width: 1.5rem;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .shake {
            animation: shake 0.3s ease-in-out infinite;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="game-container" class="w-full max-w-2xl bg-white rounded-3xl shadow-2xl p-6 md:p-10 text-center">
        <!-- Progress Bar -->
        <div class="w-full bg-gray-200 rounded-full h-2.5 mb-6">
            <div id="progress-bar" class="bg-blue-600 h-2.5 rounded-full transition-all duration-500" style="width: 0%"></div>
        </div>

        <div id="question-view">
            <!-- Image Area -->
            <div class="image-container mx-auto mb-6" id="image-wrapper">
                <img id="main-image" src="" alt="Vocabulary Image" onerror="handleImageError()">
                <div id="emoji-fallback" class="hidden fallback-emoji"></div>
            </div>

            <!-- Audio Control -->
            <button id="btn-listen" class="mb-6 bg-blue-100 hover:bg-blue-200 text-blue-700 font-bold py-2 px-6 rounded-full inline-flex items-center gap-2 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                </svg>
                Listen
            </button>

            <!-- Answer Slots -->
            <div id="answer-area" class="flex flex-wrap justify-center mb-8 min-h-[4rem]">
                <!-- Slots will be generated here -->
            </div>

            <!-- Shuffled Letters -->
            <div id="letters-pool" class="flex flex-wrap justify-center gap-3 mb-10">
                <!-- Letters will be generated here -->
            </div>

            <!-- Controls -->
            <div class="flex flex-col md:flex-row justify-center gap-4">
                <button id="btn-check" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-10 rounded-xl shadow-lg transition-transform active:scale-95">
                    CHECK ANSWER
                </button>
                <button id="btn-next" class="hidden bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-10 rounded-xl shadow-lg transition-transform active:scale-95">
                    NEXT QUESTION
                </button>
            </div>

            <div id="feedback-msg" class="mt-4 font-bold text-lg min-h-[1.5rem]"></div>
            <div id="tries-left" class="mt-2 text-sm text-gray-500 italic"></div>
        </div>

        <!-- Result View -->
        <div id="result-view" class="hidden">
            <h2 class="text-4xl font-extrabold text-indigo-800 mb-6">Course Completed!</h2>
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="bg-green-50 p-6 rounded-2xl">
                    <p class="text-green-600 font-bold uppercase text-sm">Correct</p>
                    <p id="total-correct" class="text-3xl font-black">0</p>
                </div>
                <div class="bg-red-50 p-6 rounded-2xl">
                    <p class="text-red-600 font-bold uppercase text-sm">Wrong Attempts</p>
                    <p id="total-wrong" class="text-3xl font-black">0</p>
                </div>
            </div>
            <button onclick="location.reload()" class="bg-indigo-600 text-white font-bold py-4 px-12 rounded-2xl shadow-xl hover:bg-indigo-700 transition-all">
                PLAY AGAIN
            </button>
        </div>
    </div>

    <script type="module">
        const apiKey = ""; 
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'vocab-scramble-v1';

        const vocabList = [
            { word: "Last year", emoji: "⬅️📅" },
            { word: "This year", emoji: "⬇️🗓️" },
            { word: "Summer vacation", emoji: "🏖️", image: "https://png.pngtree.com/png-clipart/20240912/original/pngtree-summer-vacation-clip-art-png-image_15994208.png?q=80&w=800" },
            { word: "Hiking", emoji: "🥾", image: "https://thumbs.dreamstime.com/b/hiking-young-woman-sunny-day-high-mountains-33933566.jpg?q=80&w=800" },
            { word: "Amusement park", emoji: "🎡", image: "https://img.freepik.com/free-vector/amusement-park_1308-32987.jpg?q=80&w=800" },
            { word: "Cotton candy", emoji: "🍭", image: "https://t3.ftcdn.net/jpg/05/21/84/78/360_F_521847869_UixBOXuKeBeVtYYiADPc9iPcjhGfMCAV.jpg?q=80&w=800" },
            { word: "Snorkeling", emoji: "🤿", image: "https://images.unsplash.com/photo-1544551763-46a013bb70d5?q=80&w=800" },
            { word: "Sandcastle", emoji: "🏰", image: "https://static.vecteezy.com/system/resources/thumbnails/052/369/616/small/sand-castle-on-ocean-beach-closeup-with-space-for-text-light-back-photo.jpg?q=80&w=800" },
            { word: "Camping", emoji: "🏕️", image: "https://images.unsplash.com/photo-1478131143081-80f7f84ca84c?q=80&w=800" },
            { word: "Lucky", emoji: "🍀", image: "https://static.vecteezy.com/system/resources/thumbnails/036/025/334/small/ai-generated-happy-saint-patrick-s-day-leaf-shamrock-clover-close-up-with-evening-sunset-in-background-ai-genrative-photo.jpg?q=80&w=800" },
            { word: "Playground", emoji: "🛝", image: "https://thumbs.dreamstime.com/b/playground-children-kids-play-equipment-outdoor-59299689.jpg?q=80&w=800" },
            { word: "Sailing", emoji: "⛵", image: "https://img.freepik.com/premium-vector/sailing-boat-icon-white-background-sailboat-vector-illustration_1142-99553.jpg?q=80&w=800" }
        ];

        const praises = ["Well done!", "Good job!", "Excellent!", "Very good!"];
        
        let shuffledList = [];
        let currentIndex = 0;
        let selectedLetters = [];
        let wrongCount = 0;
        let totalStats = { correct: 0, wrong: 0 };
        const MAX_WRONG = 3;

        async function speak(text, slow = true) {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: slow ? `Say clearly and slowly: ${text}` : text }] }],
                        generationConfig: {
                            responseModalities: ["AUDIO"],
                            speechConfig: {
                                voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } }
                            }
                        }
                    })
                });
                
                const result = await response.json();
                const pcmData = result.candidates[0].content.parts[0].inlineData.data;
                const audioBlob = pcmToWav(pcmData, 24000);
                const audioUrl = URL.createObjectURL(audioBlob);
                const audio = new Audio(audioUrl);
                audio.play();
            } catch (error) {
                const msg = new SpeechSynthesisUtterance(text);
                msg.rate = slow ? 0.7 : 1;
                msg.lang = 'en-US';
                window.speechSynthesis.speak(msg);
            }
        }

        function pcmToWav(base64, sampleRate) {
            const buffer = Uint8Array.from(atob(base64), c => c.charCodeAt(0)).buffer;
            const view = new DataView(new ArrayBuffer(44 + buffer.byteLength));
            const writeString = (offset, string) => {
                for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
            };
            writeString(0, 'RIFF');
            view.setUint32(4, 36 + buffer.byteLength, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(36, 'data');
            view.setUint32(40, buffer.byteLength, true);
            new Uint8Array(view.buffer, 44).set(new Uint8Array(buffer));
            return new Blob([view], { type: 'audio/wav' });
        }

        function playSystemSound(type) {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            const osc = context.createOscillator();
            const gain = context.createGain();
            osc.connect(gain);
            gain.connect(context.destination);

            if (type === 'correct') {
                osc.frequency.setValueAtTime(523.25, context.currentTime);
                osc.frequency.exponentialRampToValueAtTime(880, context.currentTime + 0.2);
                gain.gain.setValueAtTime(0.1, context.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, context.currentTime + 0.3);
            } else if (type === 'wrong') {
                osc.frequency.setValueAtTime(200, context.currentTime);
                osc.frequency.linearRampToValueAtTime(100, context.currentTime + 0.2);
                gain.gain.setValueAtTime(0.1, context.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, context.currentTime + 0.3);
            }
            osc.start();
            osc.stop(context.currentTime + 0.3);
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        window.handleImageError = () => {
            const current = shuffledList[currentIndex];
            document.getElementById('main-image').classList.add('hidden');
            const fallback = document.getElementById('emoji-fallback');
            fallback.textContent = current.emoji;
            fallback.classList.remove('hidden');
        };

        function initQuestion() {
            const current = shuffledList[currentIndex];
            selectedLetters = [];
            wrongCount = 0;
            
            document.getElementById('feedback-msg').textContent = "";
            document.getElementById('feedback-msg').className = "mt-4 font-bold text-lg min-h-[1.5rem]";
            document.getElementById('tries-left').textContent = "";
            document.getElementById('btn-next').classList.add('hidden');
            document.getElementById('btn-check').classList.remove('hidden');
            document.getElementById('btn-check').disabled = false;
            
            const imgEl = document.getElementById('main-image');
            const fallback = document.getElementById('emoji-fallback');
            imgEl.src = current.image;
            imgEl.classList.remove('hidden');
            fallback.classList.add('hidden');

            const answerArea = document.getElementById('answer-area');
            answerArea.innerHTML = "";
            current.word.split('').forEach((char, idx) => {
                const slot = document.createElement('div');
                if (char === ' ') {
                    slot.className = "space-slot";
                    slot.dataset.type = "space";
                    slot.dataset.index = idx;
                } else {
                    slot.className = "slot";
                    slot.dataset.type = "char";
                    slot.dataset.index = idx;
                    slot.onclick = () => removeLetter(idx);
                }
                answerArea.appendChild(slot);
            });

            const lettersPool = document.getElementById('letters-pool');
            lettersPool.innerHTML = "";
            const letters = current.word.replace(/\s/g, '').split('');
            shuffleArray(letters);
            letters.forEach((char, idx) => {
                const btn = document.createElement('div');
                btn.className = "letter-tile bg-white border-2 border-indigo-500 text-indigo-700 w-12 h-14 flex items-center justify-center rounded-xl text-2xl font-bold shadow-md hover:bg-indigo-50";
                btn.textContent = char.toUpperCase();
                btn.onclick = () => addLetter(char, btn);
                lettersPool.appendChild(btn);
            });

            speak(current.word);
            updateProgress();
        }

        function addLetter(char, btnElement) {
            const slots = Array.from(document.querySelectorAll('.slot[data-type="char"]'));
            const emptySlot = slots.find(s => !s.textContent);

            if (emptySlot) {
                emptySlot.textContent = char.toUpperCase();
                emptySlot.classList.add('filled');
                btnElement.style.visibility = 'hidden';
                selectedLetters.push({ char, btn: btnElement, slotIndex: emptySlot.dataset.index });
            }
        }

        function removeLetter(slotIndex) {
            const slots = Array.from(document.querySelectorAll('.slot'));
            const slot = slots.find(s => s.dataset.index == slotIndex);
            
            if (slot && slot.textContent) {
                const selectionIndex = selectedLetters.findIndex(sl => sl.slotIndex == slotIndex);
                if (selectionIndex > -1) {
                    const selection = selectedLetters[selectionIndex];
                    selection.btn.style.visibility = 'visible';
                    slot.textContent = "";
                    slot.classList.remove('filled');
                    selectedLetters.splice(selectionIndex, 1);
                }
            }
        }

        function checkAnswer() {
            const current = shuffledList[currentIndex];
            const allSlots = Array.from(document.querySelectorAll('#answer-area > div'));
            let userAnswer = "";
            
            // Xây dựng câu trả lời dựa trên TẤT CẢ các ô (bao gồm cả dấu cách)
            allSlots.forEach(slot => {
                if (slot.classList.contains('space-slot')) {
                    userAnswer += " ";
                } else {
                    userAnswer += slot.textContent || "";
                }
            });

            const feedback = document.getElementById('feedback-msg');
            
            if (userAnswer.toLowerCase() === current.word.toLowerCase()) {
                totalStats.correct++;
                playSystemSound('correct');
                const praise = praises[Math.floor(Math.random() * praises.length)];
                feedback.textContent = praise;
                feedback.className = "mt-4 font-bold text-lg min-h-[1.5rem] text-green-600";
                speak(praise, false);
                
                document.getElementById('btn-check').classList.add('hidden');
                document.getElementById('btn-next').classList.remove('hidden');
                document.getElementById('letters-pool').classList.add('opacity-50', 'pointer-events-none');
            } else {
                wrongCount++;
                totalStats.wrong++;
                playSystemSound('wrong');
                
                feedback.textContent = "Oops! Try again.";
                feedback.className = "mt-4 font-bold text-lg min-h-[1.5rem] text-red-600";
                
                document.getElementById('answer-area').classList.add('shake');
                setTimeout(() => document.getElementById('answer-area').classList.remove('shake'), 500);

                if (wrongCount >= MAX_WRONG) {
                    feedback.textContent = `The correct answer is: ${current.word.toUpperCase()}`;
                    document.getElementById('btn-check').classList.add('hidden');
                    document.getElementById('btn-next').classList.remove('hidden');
                    
                    // Hiển thị đáp án đúng vào các ô
                    allSlots.forEach((slot, idx) => {
                        if (!slot.classList.contains('space-slot')) {
                            slot.textContent = current.word[idx].toUpperCase();
                            slot.classList.add('text-indigo-600', 'filled');
                        }
                    });
                } else {
                    document.getElementById('tries-left').textContent = `Attempts: ${wrongCount}/${MAX_WRONG}`;
                    setTimeout(resetQuestion, 800);
                }
            }
        }

        function resetQuestion() {
            selectedLetters.forEach(sl => sl.btn.style.visibility = 'visible');
            selectedLetters = [];
            const slots = document.querySelectorAll('.slot');
            slots.forEach(s => {
                s.textContent = "";
                s.classList.remove('filled');
            });
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < shuffledList.length) {
                document.getElementById('letters-pool').classList.remove('opacity-50', 'pointer-events-none');
                initQuestion();
            } else {
                showResults();
            }
        }

        function updateProgress() {
            const percent = ((currentIndex) / shuffledList.length) * 100;
            document.getElementById('progress-bar').style.width = `${percent}%`;
        }

        function showResults() {
            document.getElementById('question-view').classList.add('hidden');
            document.getElementById('result-view').classList.remove('hidden');
            document.getElementById('progress-bar').style.width = `100%`;
            document.getElementById('total-correct').textContent = shuffledList.length;
            document.getElementById('total-wrong').textContent = totalStats.wrong;
        }

        window.onload = () => {
            shuffledList = shuffleArray([...vocabList]);
            initQuestion();

            document.getElementById('btn-check').onclick = checkAnswer;
            document.getElementById('btn-next').onclick = nextQuestion;
            document.getElementById('btn-listen').onclick = () => speak(shuffledList[currentIndex].word);

            window.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    if (!document.getElementById('btn-check').classList.contains('hidden')) {
                        checkAnswer();
                    } else if (!document.getElementById('btn-next').classList.contains('hidden')) {
                        nextQuestion();
                    }
                }
            });
        };
    </script>
</body>
</html>
